<!DOCTYPE html>
<html>
<head>
<title>Chess Board</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-size:35px;
}

.board{
display:grid;
grid-template-columns:repeat(8,60px);
}

.white{
width:60px;
height:60px;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

.black{
width:60px;
height:60px;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

</style>

</head>

<body>

<div class="board">

<!-- Row 1 -->
<div class="white">♜</div>
<div class="black">♞</div>
<div class="white">♝</div>
<div class="black">♛</div>
<div class="white">♚</div>
<div class="black">♝</div>
<div class="white">♞</div>
<div class="black">♜</div>

<!-- Row 2 -->
<div class="black">♟</div>
<div class="white">♟</div>
<div class="black">♟</div>
<div class="white">♟</div>
<div class="black">♟</div>
<div class="white">♟</div>
<div class="black">♟</div>
<div class="white">♟</div>

<!-- Row 3 -->
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>

<!-- Row 4 -->
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>

<!-- Row 5 -->
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>

<!-- Row 6 -->
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>
<div class="black"></div>
<div class="white"></div>

<!-- Row 7 -->
<div class="white">♙</div>
<div class="black">♙</div>
<div class="white">♙</div>
<div class="black">♙</div>
<div class="white">♙</div>
<div class="black">♙</div>
<div class="white">♙</div>
<div class="black">♙</div>

<!-- Row 8 -->
<div class="black">♖</div>
<div class="white">♘</div>
<div class="black">♗</div>
<div class="white">♕</div>
<div class="black">♔</div>
<div class="white">♗</div>
<div class="black">♘</div>
<div class="white">♖</div>

</div>

</body>
</html>
